name: Radar de Recitales - Actualización en vivo

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Actualizar recitales y cotización USD
        env:
          USD_API_URL: ${{ secrets.USD_API_URL }}
          USD_API_KEY: ${{ secrets.USD_API_KEY }}
          USD_API_HEADER: ${{ secrets.USD_API_HEADER }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: npm run update:data

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/concerts.json
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear"
          else
            git commit -m "chore: actualización automática de recitales y USD"
            git push
          fi
